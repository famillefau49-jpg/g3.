<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transmission Secondaire</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: linear-gradient(180deg, #0b0b0b 0%, #161616 100%);
      color: #f2e6ca;
      font-family: "Courier New", monospace;
    }

    .card {
      width: 100%;
      max-width: 850px;
      background: #1b1b1b;
      border: 2px solid #7a5c2e;
      border-radius: 18px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.65);
    }

    .topline {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #b79a65;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      letter-spacing: 3px;
      color: #9ecaff;
      text-transform: uppercase;
    }

    .subtitle {
      font-size: 15px;
      line-height: 1.6;
      opacity: 0.9;
      margin-bottom: 24px;
    }

    .launch-btn {
      background: linear-gradient(180deg, #9b7545, #7f5d35);
      border: none;
      color: white;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      width: 100%;
      max-width: 360px;
      font-family: inherit;
    }

    .screen {
      margin-top: 24px;
      padding: 22px;
      min-height: 300px;
      border-radius: 14px;
      background: #111;
      border: 1px solid rgba(183,154,101,0.18);
      text-align: left;
      line-height: 1.8;
      font-size: 18px;
      white-space: pre-line;
    }

    .cursor {
      display: inline-block;
      animation: blink 0.9s step-end infinite;
      color: #9ecaff;
      font-weight: bold;
    }

    .final-line {
      margin-top: 18px;
      padding: 18px;
      border-radius: 12px;
      background: rgba(158,202,255,0.08);
      border: 1px solid rgba(158,202,255,0.18);
      color: #dcebff;
      font-weight: bold;
      text-align: center;
      display: none;
      animation: fadeIn 0.5s ease;
      line-height: 1.8;
      font-size: 19px;
    }

    .footer {
      margin-top: 22px;
      font-size: 12px;
      opacity: 0.6;
      letter-spacing: 1px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="topline">Transmission secondaire</div>
  <h1>Mission spéciale</h1>
  <div class="subtitle">
    Un message complémentaire a été intercepté.<br>
    Activez la transmission.
  </div>

  <button class="launch-btn" onclick="startTransmission()">LANCER LA TRANSMISSION</button>

  <div class="screen" id="screen">En attente d’activation…</div>

  <div class="final-line" id="finalLine">
    ALLEZ AUX TOILETTES.<br>
    UN INDICE Y A ÉTÉ DISSIMULÉ.<br>
    LA LUMIÈRE NE MONTRE PAS TOUT.<br><br>
    TROUVEZ L’ENVELOPPE ET UTILISEZ CE QUE VOUS Y TROUVEREZ.
  </div>

  <div class="footer">VIVRE LIBRE OU MOURIR</div>
</div>

<script>
let started = false;

const lines = [
  "Connexion au réseau en cours…",
  "Signal secondaire détecté…",
  "Instruction complémentaire validée…",
  "",
  "Équipe reconnue.",
  "Votre mission n'est pas terminée.",
  "",
  "Un élément essentiel a été dissimulé.",
  "Il ne peut être vu à l'œil nu.",
  "",
  "Vous devez observer autrement.",
  "L'indice se trouve du côté des toilettes.",
  "",
  "Récupérez ce qui a été caché.",
  "Exploitez les informations obtenues."
];

function simpleBeep(freq = 800, duration = 80) {
  try {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    const ctx = new AudioContextClass();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();

    osc.type = "square";
    osc.frequency.value = freq;
    gain.gain.value = 0.03;

    osc.connect(gain);
    gain.connect(ctx.destination);

    osc.start();

    setTimeout(() => {
      osc.stop();
      ctx.close();
    }, duration);
  } catch (e) {}
}

async function typeText(text) {
  const screen = document.getElementById("screen");
  screen.innerHTML = "";
  const cursor = document.createElement("span");
  cursor.className = "cursor";
  cursor.textContent = "█";
  screen.appendChild(cursor);

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    cursor.insertAdjacentText("beforebegin", ch);

    if (ch !== " " && ch !== "\n") {
      simpleBeep(900, 20);
    }

    await new Promise(resolve => setTimeout(resolve, 35));
  }

  cursor.remove();
}

async function startTransmission() {
  if (started) return;
  started = true;

  simpleBeep(700, 120);

  const text = lines.join("\n");
  await typeText(text);

  setTimeout(() => {
    document.getElementById("finalLine").style.display = "block";
    simpleBeep(1000, 120);
    setTimeout(() => simpleBeep(1200, 140), 150);
  }, 300);
}
</script>

</body>
</html>
